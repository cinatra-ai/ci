name: Run WP/Drupal UAT suite
description: >-
  Run the WordPress/Drupal assistant Playwright UAT suite inside a
  cinatra-ai/cinatra checkout (the checkout must be the workspace the caller
  runs this action from — every step below operates on the caller's working
  directory). Bring up the docker WP/Drupal stack, run `cinatra instance setup dev`
  (clones the plugin/module + provisions the DB), then run the Playwright UAT
  suite (which boots its own dev server with the deterministic scripted
  provider). The companion devApp repos (wordpress-plugin, drupal-module,
  a2a-servers-dev) are PUBLIC, so the default anonymous-HTTPS clone needs no
  credential; pass `deploy-key` only if a devApp repo goes private again.
  Requires a Docker-capable runner that also provides the app-service env
  (SUPABASE_DB_URL, BETTER_AUTH_SECRET, REDIS_URL, …) — typically a
  provisioned self-hosted runner. See tests/e2e/wp-drupal-uat/README.md in
  cinatra-ai/cinatra.

inputs:
  deploy-key:
    description: >-
      OPTIONAL read-only SSH deploy key for the companion devApp repos. The
      devApps are public, so this is normally empty (anonymous HTTPS clone);
      provide it to clone over SSH instead (e.g. if a repo goes private).
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Set up pnpm
      uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
    - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
      with:
        node-version: "24"
        cache: "pnpm"

    - name: Configure read-only clone key (SSH)
      # Only when a deploy key is provided. The devApps are PUBLIC, so the
      # default path is `cinatra instance setup dev` cloning the package.json
      # `cinatra.devApps` URLs anonymously over HTTPS — no key material, no
      # GIT_SSH_COMMAND, no CINATRA_*_REPO_URL overrides. The SSH path below
      # stays fully functional for a future private repo: syncDevApps picks the
      # overrides up (HTTPS↔SSH origin-normalized) and clones each devApp over
      # the read-only key instead.
      if: inputs.deploy-key != ''
      shell: bash
      env:
        DEPLOY_KEY: ${{ inputs.deploy-key }}
      run: |
        set -euo pipefail
        mkdir -p ~/.ssh && chmod 700 ~/.ssh
        printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/uat_deploy_key
        chmod 600 ~/.ssh/uat_deploy_key
        ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
        {
          echo "GIT_SSH_COMMAND=ssh -i ~/.ssh/uat_deploy_key -o IdentitiesOnly=yes"
          echo "CINATRA_WORDPRESS_PLUGIN_REPO_URL=git@github.com:cinatra-ai/wordpress-plugin.git"
          echo "CINATRA_DRUPAL_MODULE_REPO_URL=git@github.com:cinatra-ai/drupal-module.git"
          echo "CINATRA_A2A_SERVERS_DEV_REPO_URL=git@github.com:cinatra-ai/a2a-servers-dev.git"
        } >> "$GITHUB_ENV"

    - name: Clone companion extension repos
      # Clone the companion extension repos back into
      # extensions/ before install. Direct `node` invocation rather than the
      # caller repo's local clone-extensions composite action — referencing a
      # caller-local action from this shared action is brittle.
      # These extension repos are PUBLIC (plain HTTPS), unaffected by the
      # optional deploy key (which only redirects the devApp clones to SSH).
      # --pinned (ci#61): check every repo out DETACHED at the sha committed in
      # cinatra-required-extensions.lock.json / cinatra-dev-extensions.lock.json.
      # This is a merge-adjacent verification surface, not the floating-HEAD
      # canary — a branch-tip clone drifts from the committed pnpm-lock.yaml the
      # moment any companion repo merges (ERR_PNPM_OUTDATED_LOCKFILE on the
      # frozen install below).
      shell: bash
      run: node scripts/ci/sync-dev-extensions.mjs --pinned

    - name: Install dependencies
      shell: bash
      run: corepack pnpm install --frozen-lockfile

    - name: Provision DB + clone plugin/module (BEFORE the CMS containers)
      shell: bash
      # MUST run before `docker compose --profile wordpress --profile drupal up`:
      # the clone targets dev/wordpress-plugin/ + dev/drupal-module/cinatra/ are bind-
      # mounted into the CMS containers. If the containers start first, Docker
      # creates root-owned empty bind-source dirs (breaking the clone) and the
      # entrypoints try to activate a plugin/module whose code does not exist yet.
      # The runner must export SUPABASE_DB_URL / BETTER_AUTH_SECRET / REDIS_URL
      # (and CINATRA_RUNTIME_MODE=development) for the dev backend + clone sync.
      # `pnpm setup:dev` (→ `cinatra instance setup dev`, ci#61): the CLI was
      # extracted to the published @cinatra-ai/cinatra package and the command
      # moved under `instance`; packages/cli/bin/cinatra.mjs is now only a
      # deploy-compat forwarder and `setup dev` is an unknown command. The
      # workspace script is the stable invocation surface.
      # --pinned flows through to setup's own dev-extension sync so it accepts
      # (and re-pins) the detached lock-sha checkouts made above — without it
      # the sync refuses the detached HEAD ("branch 'main' is expected") and
      # exits non-zero.
      run: corepack pnpm setup:dev --pinned

    - name: Bring up docker WordPress + Drupal (bind sources now exist)
      shell: bash
      run: |
        set -euo pipefail
        docker compose --profile wordpress --profile drupal up -d
        # The entrypoints background their bootstrap, so an HTTP 200 does NOT mean
        # wp-cli/drush + the plugin/module are ready. Poll for actual readiness:
        # WordPress installed + `cinatra` plugin active, Drupal `cinatra` module
        # enabled — mirroring the README's "Confirm plugin/module are active" step.
        wp_ready() {
          docker exec cinatra-wordpress-1 wp core is-installed --allow-root >/dev/null 2>&1 \
            && docker exec cinatra-wordpress-1 wp plugin is-active cinatra --allow-root >/dev/null 2>&1
        }
        drupal_ready() {
          docker exec cinatra-drupal-1 drush --root=/drupal/web pm:list --status=enabled --field=name 2>/dev/null \
            | grep -qx cinatra
        }
        for i in $(seq 1 60); do
          if wp_ready && drupal_ready; then echo "WordPress + Drupal ready (plugin/module active)"; break; fi
          if [ "$i" = "60" ]; then
            echo "::error::WordPress/Drupal not ready (plugin/module not active after ~5 min)"
            docker exec cinatra-wordpress-1 wp plugin list --allow-root 2>&1 | tail -20 || true
            docker exec cinatra-drupal-1 drush --root=/drupal/web pm:list --status=enabled 2>&1 | tail -20 || true
            exit 1
          fi
          sleep 5
        done

    - name: Install Playwright browser
      shell: bash
      run: corepack pnpm exec playwright install --with-deps chromium

    - name: Run UAT suite
      shell: bash
      run: corepack pnpm test:e2e:wp-drupal
