name: self-check

# Dogfood: the gates must run clean on their own repository, and their tests pass.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  self-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Gate runs clean on its own repository
        run: node scripts/source-leak-gate.mjs --profile default --ratchet-mode off --exit-on-match

      - name: Gitignore gate runs clean on its own repository
        run: node scripts/gitignore-gate.mjs

      - name: Tests
        run: |
          node --test \
            scripts/__tests__/source-leak-gate.test.mjs \
            scripts/__tests__/source-leak-ratchet.test.mjs \
            scripts/__tests__/source-leak-pathscan.test.mjs \
            scripts/__tests__/gitignore-gate.test.mjs
