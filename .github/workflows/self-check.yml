name: self-check

# Dogfood: the gates must run clean on their own repository, and their tests pass.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  self-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: source-leak-gate runs clean on its own repository
        # config/self-check.json exempts the actions-pinned-gate source + tests,
        # which necessarily contain the version-comment markers they enforce.
        run: node scripts/source-leak-gate.mjs --profile default --ratchet-mode off --config config/self-check.json --exit-on-match

      - name: actions-pinned-gate runs clean on its own repository
        run: node scripts/actions-pinned-gate.mjs

      - name: extension-ioc-gate passes the good fixtures + fails the bad fixture
        run: |
          node scripts/extension-ioc-gate.mjs --package scripts/__fixtures__/extension-ioc/good-connector --register-probe
          node scripts/extension-ioc-gate.mjs --package scripts/__fixtures__/extension-ioc/good-agent
          if node scripts/extension-ioc-gate.mjs --package scripts/__fixtures__/extension-ioc/bad-connector; then
            echo "::error::extension-ioc-gate did not fail the bad-connector fixture" >&2
            exit 1
          fi

      - name: Gitignore gate runs clean on its own repository
        run: node scripts/gitignore-gate.mjs

      - name: secrets-required-gate passes the clean fixture + fails the orphan fixtures
        # The ci repo itself ships no .github/secrets-required.txt manifest, so the
        # gate is dogfooded against fixtures (a clean repo, an orphan reference,
        # an orphan declaration) instead of a self-scan of this repo.
        run: |
          node scripts/secrets-required-gate.mjs --root scripts/__fixtures__/secrets-required/clean
          if node scripts/secrets-required-gate.mjs --root scripts/__fixtures__/secrets-required/orphan-reference; then
            echo "::error::secrets-required-gate did not fail the orphan-reference fixture" >&2
            exit 1
          fi
          if node scripts/secrets-required-gate.mjs --root scripts/__fixtures__/secrets-required/orphan-declaration; then
            echo "::error::secrets-required-gate did not fail the orphan-declaration fixture" >&2
            exit 1
          fi

      - name: governance-drift-gate passes the matching fixture + fails the drifted fixture
        run: |
          node scripts/governance-drift-gate.mjs \
            --root scripts/__fixtures__/governance-drift/clean \
            --live-json live.json
          if node scripts/governance-drift-gate.mjs \
            --root scripts/__fixtures__/governance-drift/drifted \
            --live-json live.json; then
            echo "::error::governance-drift-gate did not fail the drifted fixture" >&2
            exit 1
          fi

      - name: release-workflow-pin-drift-gate passes the gated fixture + fails the ungated fixture
        run: |
          node scripts/release-workflow-pin-drift-gate.mjs \
            --root scripts/__fixtures__/release-workflow-pin-drift/clean \
            --repos-json repos.json
          if node scripts/release-workflow-pin-drift-gate.mjs \
            --root scripts/__fixtures__/release-workflow-pin-drift/drifted \
            --repos-json repos.json; then
            echo "::error::release-workflow-pin-drift-gate did not fail the ungated fixture" >&2
            exit 1
          fi

      - name: meta-commentary-gate passes the clean docs fixture + fails the violating fixture
        run: |
          node scripts/check-meta-commentary.mjs --docs scripts/__fixtures__/meta-commentary/clean/docs
          if node scripts/check-meta-commentary.mjs --docs scripts/__fixtures__/meta-commentary/violating/docs; then
            echo "::error::meta-commentary-gate did not fail the violating docs fixture" >&2
            exit 1
          fi

      - name: Design-system preset runs clean on its own repository
        run: npx eslint .

      - name: Tests
        run: |
          node --test \
            scripts/__tests__/source-leak-gate.test.mjs \
            scripts/__tests__/source-leak-ratchet.test.mjs \
            scripts/__tests__/source-leak-pathscan.test.mjs \
            scripts/__tests__/gitignore-gate.test.mjs \
            scripts/__tests__/actions-pinned-gate.test.mjs \
            scripts/__tests__/ui-design-system-gate.test.mjs \
            scripts/__tests__/skills-drift-gate.test.mjs \
            scripts/__tests__/collect-skills-acks.test.mjs \
            scripts/__tests__/resolve-diff-base.test.mjs \
            scripts/__tests__/skills-drift-closeout-sweep.test.mjs \
            scripts/__tests__/truthful-attribution-gate.test.mjs \
            scripts/__tests__/gate-suite-index.test.mjs \
            scripts/__tests__/gate-suite-audit-report.test.mjs \
            scripts/__tests__/doc-code-value-gate.test.mjs \
            scripts/__tests__/extension-ioc-gate.test.mjs \
            scripts/__tests__/secrets-required-gate.test.mjs \
            scripts/__tests__/governance-drift-gate.test.mjs \
            scripts/__tests__/release-workflow-pin-drift-gate.test.mjs \
            scripts/__tests__/check-meta-commentary.test.mjs

      - name: gate-suite index is deterministic + matches a fresh scan (offline)
        # The org-wide gate-suite audit index (config/gate-suite-index.json,
        # per the attribution spec) is GENERATED. Here we re-run the generator
        # offline (no GitHub token in self-check) and confirm its OWN structure +
        # the committed file's shape are internally consistent: regenerate with a
        # null reader and assert the committed file parses + carries the inventory
        # pointer. The LIVE drift check (a fresh scan of every inventoried repo's
        # real suite, requiring auth) runs in the monthly Gate-suite audit job,
        # not in this hermetic self-check.
        run: node scripts/gate-suite-index-selfcheck.mjs

  extension-ioc-parity:
    # The REAL cross-repo parity guard: assert the
    # reusable IoC gate's pinned contract constants + its vendored #163 substrate
    # match the cinatra monorepo source of truth. Checks out cinatra (PUBLIC) at
    # main and runs ONLY the parity test with CINATRA_REPO set, so the parity
    # assertion actually executes (locally it is skipped when cinatra is absent).
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout ci
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Checkout cinatra (source of truth)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: cinatra-ai/cinatra
          ref: main
          path: .cinatra-src
          sparse-checkout: |
            packages/sdk-extensions/src
            scripts/audit/extension-readme-gate.mjs
            scripts/audit/host-peer-value-import-ban.mjs
            scripts/extensions/inventory.mjs
          sparse-checkout-cone-mode: false

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: "24"

      - name: Run the cross-repo parity test against cinatra source of truth
        env:
          CINATRA_REPO: ${{ github.workspace }}/.cinatra-src
          # FAIL CLOSED: if the checkout is incomplete, the parity test errors
          # instead of skipping green (the test asserts the root resolves).
          CINATRA_REQUIRED: "1"
        # --test-name-pattern scopes node:test to ONLY the PARITY case.
        run: node --test --test-name-pattern='PARITY' scripts/__tests__/extension-ioc-gate.test.mjs
