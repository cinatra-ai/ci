name: secret-scan-gate

# Reusable secret-scan gate. Engine = TruffleHog OSS.
# Mirrors ci/.github/workflows/source-leak-gate.yml in structure/naming so the
# emitted required status context is exactly "secret-scan-gate / secret-scan-gate"
# (workflow name `/` job key, both `secret-scan-gate`).
#
# A consuming repo calls it from its own thin caller, e.g.:
#
#   jobs:
#     secret-scan-gate:
#       uses: cinatra-ai/ci/.github/workflows/secret-scan-gate.yml@<sha>  # vX.Y.Z
#       with:
#         base_sha: ${{ github.event.pull_request.base.sha }}
#         head_sha: ${{ github.event.pull_request.head.sha }}
#
# NOTE vs source-leak-gate: there is NO second checkout of cinatra-ai/ci and NO
# `ref:` inner-pin input, because the engine is the upstream TruffleHog action
# (not a ci-repo scripts/*.mjs). The only mutable surface is the TruffleHog
# action itself, which is SHA-pinned below (satisfies actions-pinned-gate). The
# scanner ENGINE version is also pinned (`version: "3.95.5"`) so CI matches the
# baseline sweep's :3.95.5 image instead of the floating :latest tag.
on:
  workflow_call:
    inputs:
      base_sha:
        description: "Diff base commit SHA (PR: pull_request.base.sha). Empty => full working-tree scan."
        type: string
        default: ""
      head_sha:
        description: "Diff head commit SHA (PR: pull_request.head.sha). Empty => HEAD."
        type: string
        default: ""
      extra_args:
        description: "Optional extra TruffleHog CLI args appended after the gate defaults (e.g. --exclude-paths=.trufflehog-exclude)."
        type: string
        default: ""

permissions:
  contents: read

jobs:
  secret-scan-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0   # full history so base..head range scanning resolves

      # PR runs: scan only the commits the PR adds (base..head).
      # base_sha/head_sha are passed explicitly by the caller from the event so the
      # range is deterministic regardless of how the action infers the event context.
      # Fail-closed: TruffleHog hardcodes --fail in the action, and --results=verified,unknown
      # means any verified leak OR any verification-error result trips exit 183 -> step fails
      # -> required check goes RED. (unverified is excluded to limit false-positive RED.)
      # `version: "3.95.5"` pins the scanner CLI image to match the baseline sweep
      # (no :latest moving target). The action commit is SHA-pinned for supply-chain.
      - name: TruffleHog secret scan
        uses: trufflesecurity/trufflehog@27b0417c16317ca9a472a9a8092acce143b49c55 # v3.95.9
        with:
          version: "3.95.5"
          base: ${{ inputs.base_sha }}
          head: ${{ inputs.head_sha }}
          extra_args: --results=verified,unknown ${{ inputs.extra_args }}
