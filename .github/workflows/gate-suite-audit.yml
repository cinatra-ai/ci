name: gate-suite-audit

# Monthly continuous-audit job for the org-wide truthful-attribution gate suite
# registry — the Truthful Attribution protocol §4 audit. It is the MACHINE half
# of the §4 audit obligation; the HUMAN half is the Accountable engineer
# reviewing the suite + a 10% sample of gate-arm merges and recording evidence
# on the recurring `Gate-suite audit YYYY-MM` tracking issue, then bumping
# lastAuditedAt + auditEvidence in the per-repo .github/gate-suite.json.
#
# This job, with read auth, does what the hermetic self-check cannot:
#   1. Live drift check — regenerate config/gate-suite-index.json from a FRESH
#      scan of every inventoried repo's real .github/gate-suite.json and fail if
#      the committed index is out of date (open a PR to refresh it).
#   2. Staleness sweep — surface every inventoried repo whose lastAuditedAt is
#      going stale (> 35 days) or lapsed (> 65 days, gate-arm merges blocked),
#      so a lapse is visible BEFORE a PR discovers it (codex: the watchdog must
#      not be blind to staleness).
#
# It NEVER edits a gate-suite.json or closes the audit issue — those are the
# Accountable human's acts (the spec forbids the loop from fabricating a record).

on:
  schedule:
    # 06:00 UTC on the 1st of each month.
    - cron: "0 6 1 * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  gate-suite-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      # The reader distinguishes a genuine 404 (no suite) from an operational
      # failure (auth/rate-limit/5xx) — an operational failure surfaces as
      # `unreadable`/drift, never a false `no-suite`. GITHUB_TOKEN reads public
      # repo content fine; if a PRIVATE/internal repo is ever inventoried, swap
      # GH_TOKEN for a cross-repo-read token (e.g. a fine-grained PAT secret).
      - name: Live index drift check (fresh scan of inventoried repos)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/gate-suite-index.mjs --check

      # Run even when the drift check failed (drift days must not hide staleness).
      - name: Staleness sweep (warn > 35d, lapsed > 65d)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/gate-suite-audit-report.mjs
