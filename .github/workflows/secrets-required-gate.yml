name: secrets-required-gate

# Reusable workflow (cinatra-engineering#315). Fails CI when a repo's
# `.github/secrets-required.txt` manifest drifts from the secrets its workflows
# actually reference: an orphan reference (`secrets.NAME` used but not declared)
# or an orphan declaration (declared but referenced by no workflow). Deterministic
# and repo-local — no GitHub API, so it is a safe required PR/push status check.
#
# A consuming repo calls it from its own thin caller, e.g.:
#
#   jobs:
#     secrets-required-gate:
#       uses: cinatra-ai/ci/.github/workflows/secrets-required-gate.yml@<sha>  # vX.Y.Z
#       with:
#         ref: <sha>  # the SAME 40-char SHA as the workflow @ref
#
on:
  workflow_call:
    inputs:
      ref:
        description: "Git ref of this gate repo to check out (pin to a SHA in production)."
        type: string
        default: "main"

permissions:
  contents: read

jobs:
  secrets-required-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Checkout gate
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: cinatra-ai/ci
          ref: ${{ inputs.ref }}
          path: .secrets-required-gate

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Run gate
        run: node .secrets-required-gate/scripts/secrets-required-gate.mjs
