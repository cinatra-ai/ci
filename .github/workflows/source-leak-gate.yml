name: source-leak-gate

# Reusable workflow. A consuming repo calls it from its own thin caller, e.g.:
#
#   jobs:
#     source-leak-gate:
#       uses: cinatra-ai/ci/.github/workflows/source-leak-gate.yml@<sha>  # vX.Y.Z
#       with:
#         profile: php-wp-plugin
#
on:
  workflow_call:
    inputs:
      profile:
        description: "Rule profile (default | ts-monorepo | php-wp-plugin | drupal-module | ops-docs)."
        type: string
        default: "default"
      manifest:
        description: "Optional path to an include/negation manifest to scope the scan."
        type: string
        default: ""
      config:
        description: "Optional path (in the caller repo) to a per-repo JSON config."
        type: string
        default: ""
      rules:
        description: "Optional comma-separated rule-ID allowlist."
        type: string
        default: ""
      ratchet_mode:
        description: "line | file | baseline | off."
        type: string
        default: "line"
      legacy_allowlist:
        description: "Optional path to a file-ratchet legacy allowlist JSON."
        type: string
        default: ""
      gate_baseline:
        description: "Optional path to a baseline-ratchet JSON."
        type: string
        default: ""
      ref:
        description: "Git ref of this gate repo to check out (pin to a SHA in production)."
        type: string
        default: "main"

permissions:
  contents: read

jobs:
  source-leak-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Checkout gate
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: cinatra-ai/ci
          ref: ${{ inputs.ref }}
          path: .source-leak-gate

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: "24"

      # A branch ref / SHA is attacker-influenceable, so every value is passed
      # through an env var and never interpolated into a shell line (no command
      # injection via a crafted ref).
      - name: Fetch base ref
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          git fetch --no-tags origin "$BASE_REF:refs/remotes/origin/$BASE_REF"

      # Resolve the diff base via the shared resolver (single source of truth,
      # regression-locked by scripts/__tests__/resolve-diff-base.test.mjs) so this
      # gate diffs the same base under test and in production and posts correct
      # incremental status on a merge_group (merge-queue) candidate. On
      # merge_group the base_sha is an ancestor of the checked-out candidate HEAD
      # (fetch-depth: 0 above), so it is reachable without an extra fetch.
      - name: Compute diff base
        id: base
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          MG_BASE_SHA: ${{ github.event.merge_group.base_sha }}
          EVENT_BEFORE: ${{ github.event.before }}
        run: |
          printf 'ref=%s\n' "$(bash .source-leak-gate/scripts/resolve-diff-base.sh)" >> "$GITHUB_OUTPUT"

      - name: Run gate
        env:
          SOURCE_LEAK_DIFF_BASE: ${{ steps.base.outputs.ref }}
        run: |
          node .source-leak-gate/scripts/source-leak-gate.mjs \
            --profile "${{ inputs.profile }}" \
            --manifest "${{ inputs.manifest }}" \
            --config "${{ inputs.config }}" \
            --rules "${{ inputs.rules }}" \
            --ratchet-mode "${{ inputs.ratchet_mode }}" \
            --legacy-allowlist "${{ inputs.legacy_allowlist }}" \
            --gate-baseline "${{ inputs.gate_baseline }}" \
            --exit-on-match
