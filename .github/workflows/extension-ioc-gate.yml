name: extension-ioc-gate

# Reusable workflow: the extension→host IoC conformance gate
# (cinatra-engineering#156). A consuming extension repo calls it from its own
# thin caller — replacing the connector/artifact/skill `kind-gates` placeholder:
#
#   jobs:
#     extension-ioc-gate:
#       # In production pin BOTH the workflow ref (`@<sha>`) and the `ref` input
#       # below to the SAME commit SHA, so the gate code is not pulled from
#       # mutable main.
#       uses: cinatra-ai/ci/.github/workflows/extension-ioc-gate.yml@<sha>  # vX.Y.Z
#       with:
#         package: "."          # the extension package directory to validate
#         register-probe: true  # run register(ctx) against the test host substrate
#         ref: <sha>
#
# Validates ONE extension package against the host-tree-INDEPENDENT extension→host
# IoC contract: manifest shape, import-ban (`@/`, cross-extension, non-SDK
# first-party), host-peer value-import ban over the serverEntry graph, SDK-only
# first-party deps, README/license/kind, and serverEntry/built-artifact preflight.
# Node builtins only, zero registry dependency. It consumes (does not duplicate)
# the #163 SDK validator substrate via a byte-identical vendored copy.

on:
  workflow_call:
    inputs:
      package:
        description: "Path (in the caller repo) to the extension package directory to validate."
        type: string
        default: "."
      register-probe:
        description: "Also run the extension's register(ctx) against the faithful test host context and report a REDACTED summary."
        type: boolean
        default: false
      format:
        description: "Output format: text | json."
        type: string
        default: "text"
      ref:
        description: "Git ref of this gate repo to check out (pin to a SHA in production)."
        type: string
        default: "main"

permissions:
  contents: read

jobs:
  extension-ioc-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Checkout gate
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: cinatra-ai/ci
          ref: ${{ inputs.ref }}
          path: .extension-ioc-gate

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Run gate
        # Caller inputs are passed via ENV, never interpolated into the shell
        # source, so a crafted `package`/`format` input cannot inject a command.
        # The boolean `register-probe` is the only `${{ }}` expansion and yields a
        # fixed flag string.
        env:
          IOC_PACKAGE: ${{ inputs.package }}
          IOC_FORMAT: ${{ inputs.format }}
        run: |
          node .extension-ioc-gate/scripts/extension-ioc-gate.mjs \
            --package "$IOC_PACKAGE" \
            --format "$IOC_FORMAT" \
            ${{ inputs.register-probe && '--register-probe' || '' }}
