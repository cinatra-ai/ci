name: gitignore-gate

# Reusable workflow. A consuming repo calls it from its own thin caller, e.g.:
#
#   jobs:
#     gitignore-gate:
#       uses: cinatra-ai/ci/.github/workflows/gitignore-gate.yml@<sha>  # vX.Y.Z
#
on:
  workflow_call:
    inputs:
      ref:
        description: "Git ref of this gate repo to check out (pin to a SHA in production)."
        type: string
        default: "main"

permissions:
  contents: read

jobs:
  gitignore-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Checkout gate
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: cinatra-ai/ci
          ref: ${{ inputs.ref }}
          path: .gitignore-gate

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Run gate
        run: node .gitignore-gate/scripts/gitignore-gate.mjs
