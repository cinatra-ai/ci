name: secret-scan-sweep

# Scheduled org-wide secret SWEEP — the DETECTIVE control that pairs the
# per-PR, preventive secret-scan-gate.
#
# The gate blocks a leak at PR time, but the owner can `--admin` merge
# past a RED required check. This sweep is the safety net for exactly that case:
# once a week it re-scans the FULL git history of EVERY cinatra-ai repo with the
# same pinned TruffleHog engine (3.95.5) and `--only-verified`, then ALERTS on
# any verified finding by opening ONE summary issue in the PRIVATE repo
# cinatra-ai/cinatra-engineering, assigned to groganz.
#
# Design (approved):
#   - Auth = a cinatra-agent-bot GitHub App, minted in-workflow via the OFFICIAL
#     actions/create-github-app-token action (SHA-pinned below) into TWO
#     least-privilege tokens so the clone loop never holds write power:
#       (a) a SCAN token — contents:read + metadata:read org-wide (enumerate +
#           clone history); cannot write anything.
#       (b) an ALERT token — issues:write scoped to ONLY cinatra-engineering
#           (open/append the alert); cannot read other repos.
#     The App's installation/permissions are provisioned separately; this
#     workflow only references its two secrets (APP_ID + PRIVATE_KEY).
#   - Engine parity with the per-PR gate: the secret-scan-gate runs the
#     trufflesecurity/trufflehog action pinned at engine 3.95.5 (version "3.95.5").
#     A sweep over 100+ repos needs to (a) iterate every repo, (b) NOT abort on
#     the first finding (the action hardcodes `--fail`), and (c) aggregate into a
#     single alert. So the sweep drives the SAME pinned engine image
#     (ghcr.io/trufflesecurity/trufflehog:3.95.5, version-tag pinned) directly
#     over each cloned repo with `git file://… --only-verified --no-fail --json`.
#     Same engine + version as the gate, but verified-ONLY: a NARROWER subset
#     than the gate's `--results=verified,unknown` (the gate also fails on
#     verification errors). The harness differs too (loop + aggregate vs single
#     fail-closed check).
#   - SECRET HYGIENE: only the JSON `DetectorName`, source repo, and a REDACTED
#     locator (commit + file + line) are ever emitted. The raw secret value
#     (`Raw`/`RawV2`/`Redacted`) is NEVER printed to logs or written to the issue.
#
# Scope choice: NON-ARCHIVED repos by default. Archived repos are read-only and
# cannot receive a remediating PR; scanning them would create un-actionable
# alerts. Set the `include_archived` dispatch input to also sweep archived repos.
#
# This workflow lives in cinatra-ai/ci (a PUBLIC repo) but writes ONLY to the
# PRIVATE cinatra-engineering repo — no finding detail ever lands in a public
# surface. The two App secrets MUST be stored as cinatra-ai/ci Actions secrets
# (or an org-level secret scoped to ci); they are referenced, never echoed.

on:
  schedule:
    # 07:00 UTC every Monday. Detective cadence — weekly is enough to catch an
    # admin-bypass leak well inside a remediation window, without hammering the
    # API. (Offset from gate-suite-audit's 06:00 to avoid a thundering herd.)
    - cron: "0 7 * * 1"
  workflow_dispatch:
    inputs:
      include_archived:
        description: "Also sweep archived repos (read-only; default false — archived repos can't take a fix PR)."
        type: boolean
        required: false
        default: false

# Minimal at the top; the single job escalates to exactly what it needs.
permissions:
  contents: read

concurrency:
  # Never let two sweeps (e.g. a manual run during the weekly cron) race on the
  # same alert issue and double-open. Serialize; a queued run supersedes.
  group: secret-scan-sweep
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    # 100+ repos cloned at full depth + scanned can take a while; cap generously.
    timeout-minutes: 120
    permissions:
      # No GITHUB_TOKEN write surface is needed — all reads/writes go through the
      # App installation token. Keep the default job token read-only.
      contents: read
    env:
      ALERT_REPO: cinatra-ai/cinatra-engineering
      ALERT_ASSIGNEE: groganz
      TRUFFLEHOG_IMAGE: ghcr.io/trufflesecurity/trufflehog:3.95.5
    steps:
      # 1a) Mint a SCAN token: org-wide but READ-ONLY (contents+metadata). This
      #     token enumerates + clones every repo; it can NOT write anything, so a
      #     leak of the clone-loop token cannot mutate any repo or open issues.
      - name: Mint scan token (org-wide, read-only)
        id: scan-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.CINATRA_AGENT_APP_ID }}
          private-key: ${{ secrets.CINATRA_AGENT_APP_PRIVATE_KEY }}
          owner: cinatra-ai
          permission-contents: read
          permission-metadata: read

      # 1b) Mint a separate ALERT token: issues:write scoped to ONLY the
      #     cinatra-engineering repo. The clone loop never holds a write-capable
      #     token; the alert step never holds an org-wide read token.
      - name: Mint alert token (issues:write on cinatra-engineering only)
        id: alert-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.CINATRA_AGENT_APP_ID }}
          private-key: ${{ secrets.CINATRA_AGENT_APP_PRIVATE_KEY }}
          owner: cinatra-ai
          repositories: cinatra-engineering
          permission-issues: write

      # 2) Enumerate EVERY cinatra-ai repo with full pagination (the org has
      #    100+ repos; a single page would silently miss the tail). Emits a
      #    newline-delimited list of clone slugs (owner/name) to repos.txt.
      - name: Enumerate org repos (paginated)
        id: enumerate
        env:
          GH_TOKEN: ${{ steps.scan-token.outputs.token }}
          INCLUDE_ARCHIVED: ${{ inputs.include_archived }}
        run: |
          set -euo pipefail
          # --paginate walks every page; the jq filter drops archived repos
          # unless include_archived=true. fork/template repos are still org
          # property and can leak, so they are IN scope.
          if [ "${INCLUDE_ARCHIVED}" = "true" ]; then
            FILTER='.[] | .full_name'
          else
            FILTER='.[] | select(.archived == false) | .full_name'
          fi
          gh api --paginate "orgs/cinatra-ai/repos?per_page=100&type=all" \
            --jq "${FILTER}" | sort -u > repos.txt
          count="$(wc -l < repos.txt | tr -d ' ')"
          echo "Enumerated ${count} repos to scan (include_archived=${INCLUDE_ARCHIVED})."
          if [ "${count}" = "0" ]; then
            echo "::error::Enumerated 0 repos — auth or pagination failure, refusing to report a false 'all clean'." >&2
            exit 1
          fi
          echo "count=${count}" >> "$GITHUB_OUTPUT"

      # 3) Pre-pull the pinned engine image once (deterministic version).
      - name: Pull pinned TruffleHog engine
        run: |
          set -euo pipefail
          docker pull "${TRUFFLEHOG_IMAGE}"

      # 4) Clone each repo's FULL history and scan with the pinned engine,
      #    --only-verified. Aggregate verified findings into findings.ndjson
      #    (one redacted record per finding). NEVER print a raw secret value.
      - name: Scan all repos (full history, --only-verified)
        id: scan
        env:
          # x-access-token:<installation-token> authenticates the git clone over
          # HTTPS. This is the READ-ONLY scan token; origin is scrubbed right
          # after clone so the token never persists in the cloned .git/config.
          GH_APP_TOKEN: ${{ steps.scan-token.outputs.token }}
        run: |
          set -euo pipefail
          : > findings.ndjson          # redacted, aggregated findings
          : > scan-errors.txt          # repos that failed to clone/scan
          workdir="$(mktemp -d)"
          trap 'rm -rf "${workdir}"' EXIT

          total=0
          verified_total=0
          while IFS= read -r slug; do
            [ -z "${slug}" ] && continue
            total=$((total + 1))
            dest="${workdir}/$(echo "${slug}" | tr '/' '_')"
            # Quiet, full-history clone. Token is interpolated only into the
            # remote URL for this process; never echoed (set +x is the default,
            # we never enable -x). `--mirror`-equivalent full history via a
            # normal clone with no depth limit.
            if ! git clone --quiet \
                "https://x-access-token:${GH_APP_TOKEN}@github.com/${slug}.git" \
                "${dest}" 2>/dev/null; then
              echo "${slug}: clone failed" >> scan-errors.txt
              echo "::warning::clone failed for ${slug} (skipped)"
              continue
            fi
            # Scrub the credential-bearing remote so the scan token does NOT
            # persist in the cloned .git/config (which is mounted into the
            # scanner container below). The local-history scan needs no remote.
            git -C "${dest}" remote set-url origin "https://github.com/${slug}.git" 2>/dev/null || true

            # Run the SAME pinned engine as the per-PR secret-scan-gate over the full local
            # history. --only-verified reports verified findings ONLY (narrower
            # than the gate's verified+unknown); --no-fail so a finding does not
            # abort the loop (we aggregate and decide). --json for
            # machine-parseable, redactable output.
            # Mount the clone read-only; scan `git file://` to walk all history.
            # Capture the engine exit code: with --no-fail a NONZERO exit means
            # the scan itself failed (not "secret found"). A failed scan must be
            # recorded as PARTIAL COVERAGE, never silently counted as clean.
            # stderr is discarded (never printed) so scanned content can't leak.
            set +e
            raw="$(docker run --rm -v "${dest}:/scan:ro" "${TRUFFLEHOG_IMAGE}" \
              git file:///scan --only-verified --no-fail --json 2>/dev/null)"
            scan_rc=$?
            set -e
            if [ "${scan_rc}" -ne 0 ]; then
              echo "${slug}: scan failed (engine exit ${scan_rc})" >> scan-errors.txt
              echo "::warning::scan failed for ${slug} (engine exit ${scan_rc}; coverage partial)"
              rm -rf "${dest}"
              continue
            fi

            # Project ONLY non-sensitive fields. The redacted locator is
            # detector + commit + file + line — NEVER Raw/RawV2/Redacted (the
            # value itself). Attach the source repo slug to each record. A jq
            # projection FAILURE is also recorded — a finding we couldn't parse
            # must not silently vanish.
            if [ -n "${raw}" ]; then
              if ! printf '%s\n' "${raw}" | jq -c --arg repo "${slug}" '
                select(.SourceMetadata != null) | {
                  repo: $repo,
                  detector: .DetectorName,
                  verified: .Verified,
                  commit: (.SourceMetadata.Data.Git.commit // "unknown"),
                  file:   (.SourceMetadata.Data.Git.file   // "unknown"),
                  line:   (.SourceMetadata.Data.Git.line   // 0)
                } | select(.verified == true)
              ' >> findings.ndjson; then
                echo "${slug}: finding projection failed" >> scan-errors.txt
                echo "::warning::finding projection failed for ${slug} (coverage partial)"
              fi
            fi
            rm -rf "${dest}"
          done < repos.txt

          verified_total="$(wc -l < findings.ndjson | tr -d ' ')"
          echo "Scanned ${total} repos; ${verified_total} verified finding record(s)."
          echo "verified_total=${verified_total}" >> "$GITHUB_OUTPUT"

      # 5) If any verified finding exists, open ONE idempotent summary issue in
      #    the PRIVATE cinatra-engineering repo, assigned to groganz. The body
      #    lists repo + REDACTED locator only. If an open issue with the same
      #    title prefix already exists for this run window, append a comment
      #    instead of opening a duplicate.
      - name: Alert on verified findings (idempotent issue in cinatra-engineering)
        if: ${{ steps.scan.outputs.verified_total != '0' }}
        env:
          # Issue write goes through the ALERT token (issues:write scoped to ONLY
          # cinatra-engineering). The default GITHUB_TOKEN cannot write to another
          # repo, and the read-only scan token cannot write issues.
          GH_TOKEN: ${{ steps.alert-token.outputs.token }}
        run: |
          set -euo pipefail
          run_date="$(date -u +%Y-%m-%d)"
          title="[secret-sweep] verified secret(s) found ${run_date}"
          title_prefix="[secret-sweep] verified secret(s) found"

          # Build the redacted body: a markdown table of repo + locator. The
          # secret value is categorically absent (we only carried detector/loc).
          {
            echo "Weekly org-wide TruffleHog sweep found verified secret(s)."
            echo ""
            echo "Scan window: ${run_date} (UTC)."
            echo "Engine: ${TRUFFLEHOG_IMAGE} (--only-verified), full git history."
            echo ""
            echo "**REDACTED locators only — no secret value is ever recorded here.**"
            echo ""
            echo "| repo | detector | commit | file | line |"
            echo "| --- | --- | --- | --- | --- |"
            jq -r '
              (.repo|gsub("\\|";"\\|")) as $r
              | (.detector|gsub("\\|";"\\|")) as $d
              | (.file|gsub("\\|";"\\|")) as $f
              | "| \($r) | \($d) | `\(.commit[0:12])` | \($f) | \(.line) |"
            ' findings.ndjson | sort -u
            echo ""
            echo "Remediation: rotate each verified secret at its provider, purge from history if needed, and confirm the per-PR secret-scan-gate is enforced on the affected repo."
          } > issue-body.md

          # Idempotency: dedup on ANY open sweep issue (stable prefix, IGNORING
          # the date in its title) so a STANDING unremediated finding appends a
          # comment each week instead of spawning a new issue. A fresh issue is
          # opened only when no open sweep issue exists (i.e. the prior one was
          # remediated and closed).
          existing="$(gh issue list \
            --repo "${ALERT_REPO}" \
            --state open \
            --search "in:title \"${title_prefix}\"" \
            --json number,title \
            --jq "[.[] | select(.title | startswith(\"${title_prefix}\"))][0].number // empty")"

          if [ -n "${existing}" ]; then
            echo "Open sweep issue #${existing} already exists; appending the ${run_date} scan instead of duplicating."
            gh issue comment "${existing}" --repo "${ALERT_REPO}" --body-file issue-body.md
          else
            gh issue create \
              --repo "${ALERT_REPO}" \
              --title "${title}" \
              --body-file issue-body.md \
              --assignee "${ALERT_ASSIGNEE}"
          fi

      # 6) Surface clone/scan errors (operational failures) as a warning so a
      #    partial sweep is never silently read as "all clean".
      - name: Report scan errors (non-fatal)
        if: always()
        run: |
          set -euo pipefail
          if [ -s scan-errors.txt ]; then
            echo "::warning::Some repos failed to clone/scan (see below); sweep coverage is partial:"
            cat scan-errors.txt
          else
            echo "No clone/scan errors."
          fi
